<!DOCTYPE html>
<html lang="so">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1D9E75" />
    <title>EasyBook — Maamulka Ganacsi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: 'Inter', sans-serif; }
      #root { min-height: 100vh; }
      #debug-overlay { position: fixed; top:0; left:0; right:0; background:#fee2e2; color:#7f1d1d; padding:16px; font-family: monospace; font-size: 13px; z-index: 99999; white-space: pre-wrap; word-break: break-word; display:none; }
    </style>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var el = document.getElementById('debug-overlay');
        if (el) {
          el.style.display = 'block';
          el.textContent = 'ERROR: ' + msg + '\nFile: ' + url + '\nLine: ' + line + '\nStack: ' + (error && error.stack ? error.stack : 'n/a');
        }
        return false;
      };
    </script>
  </head>
  <body>
    <noscript>EasyBook requires JavaScript to run.</noscript>
    <div id="debug-overlay"></div>
    <div id="root"></div>
  </body>
</html>
